<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CFCS v4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #0a0a0f; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; min-height: 100vh; overflow-x: hidden;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(180deg, #12121a, #0e0e16);
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1a1a2a;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.header .logo { font-size: 14px; color: #00e5ff; font-weight: 800; letter-spacing: 1px; }
.header .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #00c864; display: inline-block; margin-right: 6px; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.price-block { text-align: right; }
.price-block .price { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; transition: color 0.2s; }
.price-block .sym { font-size: 10px; color: #666; }

/* ─── SYMBOL BAR ─── */
.sym-bar {
  background: #0a0a0f; padding: 6px 12px;
  display: flex; gap: 6px; overflow-x: auto;
  border-bottom: 1px solid #111;
  scrollbar-width: none;
}
.sym-bar::-webkit-scrollbar { display: none; }
.sym-btn {
  background: #16161e; border: 1px solid #222;
  color: #888; padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer;
  transition: all 0.2s;
}
.sym-btn.active { background: #0077b6; color: #fff; border-color: #00b4d8; }
.sym-btn:active { transform: scale(0.93); }

/* ─── SEARCH BAR ─── */
.search-bar {
  background: #0a0a0f; padding: 6px 12px;
  display: flex; gap: 6px; align-items: center;
  border-bottom: 1px solid #111;
}
.search-bar input {
  flex: 1; background: #16161e; border: 1px solid #222;
  color: #fff; padding: 8px 12px; border-radius: 10px;
  font-size: 13px; text-transform: uppercase; outline: none;
  font-family: inherit;
}
.search-bar input::placeholder { color: #444; text-transform: none; }
.search-bar input:focus { border-color: #00b4d8; }
.search-bar button {
  background: linear-gradient(135deg, #00b4d8, #0077b6);
  color: #fff; border: none; padding: 8px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.search-bar button:active { transform: scale(0.93); }

.search-results {
  background: #12121a; border: 1px solid #222; border-radius: 10px;
  margin: 0 12px; max-height: 200px; overflow-y: auto;
  display: none; position: relative; z-index: 50;
}
.search-results.show { display: block; }
.search-item {
  padding: 10px 12px; border-bottom: 1px solid #1a1a2a;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
}
.search-item:last-child { border-bottom: none; }
.search-item:active { background: #1a1a2e; }
.search-item .name { font-size: 13px; font-weight: 600; color: #e0e0e0; }
.search-item .pair { font-size: 10px; color: #555; }
.search-item .price-sm { font-size: 12px; color: #888; font-variant-numeric: tabular-nums; }
.search-no-result { padding: 12px; text-align: center; font-size: 12px; color: #444; }

/* ─── PULLBACK ALERT ─── */
.alert-box {
  margin: 6px 10px; padding: 10px; border-radius: 10px;
  font-size: 12px; font-weight: 600; text-align: center;
  display: none; line-height: 1.4;
}
.alert-box.show { display: block; }
.alert-box.pullback-long { background: rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.3); color: #00b4d8; }
.alert-box.pullback-short { background: rgba(255,165,0,0.1); border: 1px solid rgba(255,165,0,0.3); color: #ffa500; }
.alert-box.strong-up { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.3); color: #00c864; }
.alert-box.strong-dn { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #dc3232; }
.alert-box.deep-pb { background: rgba(255,100,0,0.1); border: 1px solid rgba(255,100,0,0.3); color: #ff6400; }

/* ─── ENTRY SIGNAL ─── */
.signal-card {
  margin: 6px 10px; padding: 14px; border-radius: 14px;
  text-align: center; transition: all 0.3s;
}
.signal-card.long-ready { background: linear-gradient(135deg, rgba(0,200,100,0.12), rgba(0,200,100,0.04)); border: 2px solid rgba(0,200,100,0.5); }
.signal-card.short-ready { background: linear-gradient(135deg, rgba(220,50,50,0.12), rgba(220,50,50,0.04)); border: 2px solid rgba(220,50,50,0.5); }
.signal-card.wait { background: rgba(40,40,50,0.5); border: 2px solid #2a2a3a; }
.signal-txt { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
.signal-card.long-ready .signal-txt { color: #00c864; }
.signal-card.short-ready .signal-txt { color: #dc3232; }
.signal-card.wait .signal-txt { color: #555; }
.chk-row { margin-top: 6px; font-size: 12px; color: #888; font-weight: 500; letter-spacing: 0.5px; }
.chk-row .ok { color: #00c864; }
.chk-row .fail { color: #dc3232; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
.signal-pulse { animation: pulse 1.5s ease-in-out infinite; }

/* ─── RSI GRID ─── */
.sec-label { padding: 8px 12px 4px; font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
.rsi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px 10px; }
.rsi-card {
  background: #12121a; border-radius: 12px; padding: 10px;
  border: 1px solid #1e1e2a; transition: border-color 0.3s;
}
.rsi-card.long { border-left: 3px solid #00c864; }
.rsi-card.short { border-left: 3px solid #dc3232; }
.rsi-tf { font-size: 10px; color: #555; font-weight: 700; }
.rsi-dir { font-size: 16px; font-weight: 800; margin: 2px 0; }
.rsi-dir.long { color: #00c864; }
.rsi-dir.short { color: #dc3232; }
.rsi-nums { font-size: 12px; color: #aaa; }
.rsi-nums .sig { color: #666; font-size: 11px; }
.rsi-bar { height: 3px; background: #1a1a2a; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.rsi-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

/* ─── PROBABILITY ─── */
.prob-card {
  margin: 6px 10px; background: #12121a; border-radius: 12px;
  padding: 10px; border: 1px solid #1e1e2a;
}
.prob-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.prob-head .lbl { font-size: 10px; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.prob-head .val { font-size: 16px; font-weight: 800; }
.prob-bar { height: 20px; background: #1a1a2a; border-radius: 10px; overflow: hidden; position: relative; }
.prob-fill { height: 100%; border-radius: 10px; transition: all 0.5s; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
.prob-labels { display: flex; justify-content: space-between; font-size: 9px; color: #444; margin-top: 3px; }

/* ─── KARAR MERKEZİ ─── */
.km-card {
  margin: 6px 10px; background: #12121a; border-radius: 12px;
  border: 1px solid #1e1e2a; overflow: hidden;
}
.km-title { padding: 8px; text-align: center; font-size: 11px; font-weight: 700; color: #00e5ff; letter-spacing: 2px; border-bottom: 1px solid #1a1a2a; text-transform: uppercase; }
.km-row { display: flex; justify-content: space-between; padding: 7px 10px; border-bottom: 1px solid #0e0e16; align-items: center; }
.km-row:last-child { border-bottom: none; }
.km-row .lbl { font-size: 11px; color: #555; font-weight: 600; }
.km-row .val { font-size: 12px; font-weight: 700; }

/* ─── VOLUME ─── */
.vol-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 4px 10px; }
.vol-card { background: #12121a; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #1e1e2a; }
.vol-card .lbl { font-size: 9px; color: #555; font-weight: 700; text-transform: uppercase; }
.vol-card .val { font-size: 18px; font-weight: 800; margin-top: 2px; }

/* ─── STATUS ─── */
.status { padding: 8px; text-align: center; font-size: 9px; color: #333; }
.status .live { color: #00c864; }
.status .err { color: #dc3232; }

/* ─── LOADING ─── */
.loading { text-align: center; padding: 60px 20px; }
.spinner { width: 28px; height: 28px; border: 3px solid #1a1a2a; border-top-color: #00e5ff; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { color: #444; font-size: 12px; }

/* ─── VIBRATION FEEDBACK (on signal change) ─── */
</style>
</head>
<body>

<div class="header">
  <div>
    <span class="live-dot" id="liveDot"></span>
    <span class="logo">CFCS v4</span>
  </div>
  <div class="price-block">
    <div class="price" id="price">--</div>
    <div class="sym" id="symLabel">--</div>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Coin ara... (BTC, ETH, SOL...)" oninput="searchCoin(this.value)" onfocus="searchCoin(this.value)">
  <button onclick="searchGo()">Git</button>
</div>
<div class="search-results" id="searchResults"></div>

<div class="sym-bar" id="symBar">
  <button class="sym-btn" onclick="go('BTCUSDT')">BTC</button>
  <button class="sym-btn" onclick="go('ETHUSDT')">ETH</button>
  <button class="sym-btn" onclick="go('SOLUSDT')">SOL</button>
  <button class="sym-btn" onclick="go('BNBUSDT')">BNB</button>
  <button class="sym-btn" onclick="go('XRPUSDT')">XRP</button>
  <button class="sym-btn" onclick="go('DOGEUSDT')">DOGE</button>
  <button class="sym-btn active" onclick="go('FLOWUSDT')">FLOW</button>
  <button class="sym-btn" onclick="go('ACXUSDT')">ACX</button>
  <button class="sym-btn" onclick="go('SUIUSDT')">SUI</button>
  <button class="sym-btn" onclick="go('PEPEUSDT')">PEPE</button>
  <button class="sym-btn" onclick="go('WIFUSDT')">WIF</button>
</div>

<div id="loader">
  <div class="loading"><div class="spinner"></div><div class="loading-txt">Veriler yükleniyor...</div></div>
</div>

<div id="app" style="display:none; padding-bottom: 20px;">
  <div class="alert-box" id="alertBox"></div>
  <div class="signal-card wait" id="signalCard">
    <div class="signal-txt" id="signalTxt">❌ BEKLE</div>
    <div class="chk-row" id="chkRow"></div>
  </div>

  <div class="sec-label">MTF Osilatör</div>
  <div class="rsi-grid" id="rsiGrid"></div>

  <div class="prob-card">
    <div class="prob-head">
      <span class="lbl">Olasılık</span>
      <span class="val" id="probVal">--</span>
    </div>
    <div class="prob-bar"><div class="prob-fill" id="probFill"></div></div>
    <div class="prob-labels"><span>SHORT</span><span>NÖTR</span><span>LONG</span></div>
  </div>

  <div class="km-card">
    <div class="km-title">Karar Merkezi</div>
    <div class="km-row"><span class="lbl">TREND</span><span class="val" id="kmT">--</span></div>
    <div class="km-row"><span class="lbl">REJİM</span><span class="val" id="kmR">--</span></div>
    <div class="km-row"><span class="lbl">HACİM</span><span class="val" id="kmH">--</span></div>
    <div class="km-row"><span class="lbl">OSİLATÖR</span><span class="val" id="kmO">--</span></div>
    <div class="km-row"><span class="lbl">KALİTE</span><span class="val" id="kmK">--</span></div>
  </div>

  <div class="sec-label">Hacim Analizi</div>
  <div class="vol-row">
    <div class="vol-card"><div class="lbl">Alıcı</div><div class="val" id="vBuy" style="color:#00c864">--</div></div>
    <div class="vol-card"><div class="lbl">Satıcı</div><div class="val" id="vSell" style="color:#dc3232">--</div></div>
  </div>

  <div class="status">
    <span id="statusTxt" class="live">Canlı</span> · <span id="updateTime">--</span>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════
// CFCS v4 MOBILE APP — Binance Futures Real-time
// ═════════════════════════════════════════════════════
const API = 'https://fapi.binance.com/fapi/v1/klines';
const TFS = [
  { label: '15M', iv: '15m' },
  { label: '30M', iv: '30m' },
  { label: '1H',  iv: '1h'  },
  { label: '4H',  iv: '4h'  }
];
const RSI_P = 14, SIG_P = 14;

let SYM = 'FLOWUSDT';
let ws = null, data = {}, vol = {}, price = 0, prevPrice = 0;
let prevSignal = 'wait';
let timer = null;

// ─── RSI ───
function rsi(c, p) {
  if (c.length < p + 1) return [];
  const r = [];
  let g = 0, l = 0;
  for (let i = 1; i <= p; i++) { const d = c[i] - c[i-1]; d > 0 ? g += d : l -= d; }
  g /= p; l /= p;
  r.push(l === 0 ? 100 : 100 - 100/(1 + g/l));
  for (let i = p+1; i < c.length; i++) {
    const d = c[i] - c[i-1];
    g = (g*(p-1) + (d>0?d:0))/p;
    l = (l*(p-1) + (d<0?-d:0))/p;
    r.push(l === 0 ? 100 : 100 - 100/(1 + g/l));
  }
  return r;
}

function sma(a, p) {
  const r = [];
  for (let i = 0; i < a.length; i++) {
    if (i < p-1) { r.push(null); continue; }
    let s = 0; for (let j = i-p+1; j <= i; j++) s += a[j];
    r.push(s/p);
  }
  return r;
}

// ─── Fetch ───
async function fetchK(sym, iv, n = 100) {
  const r = await fetch(`${API}?symbol=${sym}&interval=${iv}&limit=${n}`);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function load() {
  try {
    const ps = TFS.map(t => fetchK(SYM, t.iv));
    ps.push(fetchK(SYM, '5m', 20)); // volume
    const res = await Promise.all(ps);

    for (let i = 0; i < TFS.length; i++) {
      const cl = res[i].map(k => +k[4]);
      const rv = rsi(cl, RSI_P);
      const sv = sma(rv, SIG_P);
      const last = rv[rv.length-1], prev = rv.length > 1 ? rv[rv.length-2] : last;
      const sig = sv[sv.length-1];
      data[TFS[i].iv] = { rsi: last, prev, sig, up: last > sig, cl: cl[cl.length-1] };
    }

    // Volume (14-bar rolling on 5m)
    let bv = 0, sv2 = 0;
    const k5 = res[TFS.length].slice(-14);
    for (const k of k5) { +k[4] > +k[1] ? bv += +k[5] : sv2 += +k[5]; }
    vol = { b: bv, s: sv2 };

    if (!price) price = data['15m']?.cl || 0;
    render();
    el('loader').style.display = 'none';
    el('app').style.display = 'block';
    setSt('live', 'Canlı');
  } catch(e) {
    setSt('err', 'Hata: ' + e.message);
  }
}

// ─── WebSocket ───
function connectWS() {
  if (ws) { ws.close(); ws = null; }
  ws = new WebSocket(`wss://fstream.binance.com/ws/${SYM.toLowerCase()}@aggTrade`);
  ws.onmessage = e => {
    prevPrice = price;
    price = +(JSON.parse(e.data).p);
    el('price').textContent = price.toFixed(price > 100 ? 2 : price > 1 ? 4 : 6);
    el('price').style.color = price >= prevPrice ? '#00c864' : '#dc3232';
  };
  ws.onerror = () => setSt('err', 'WS Hata');
  ws.onclose = () => setTimeout(connectWS, 3000);
}

// ─── Render ───
function render() {
  renderRSI();
  renderKM();
  renderAlert();
  el('updateTime').textContent = new Date().toLocaleTimeString('tr-TR');
}

function renderRSI() {
  const g = el('rsiGrid');
  g.innerHTML = '';
  for (const t of TFS) {
    const d = data[t.iv];
    if (!d) continue;
    const cls = d.up ? 'long' : 'short';
    const dir = d.up ? 'LONG ↑' : 'SHORT ↓';
    const pct = Math.min(100, Math.max(0, d.rsi));
    const bc = d.up ? '#00c864' : '#dc3232';
    const div = document.createElement('div');
    div.className = `rsi-card ${cls}`;
    div.innerHTML = `
      <div class="rsi-tf">${t.label}</div>
      <div class="rsi-dir ${cls}">${dir}</div>
      <div class="rsi-nums">RSI: ${d.rsi.toFixed(1)} <span class="sig">Sig: ${d.sig?d.sig.toFixed(1):'--'}</span></div>
      <div class="rsi-bar"><div class="rsi-bar-fill" style="width:${pct}%;background:${bc}"></div></div>`;
    g.appendChild(div);
  }
}

function renderKM() {
  let rsiSum = 0, cnt = 0, oscBull = 0;
  for (const t of TFS) {
    const d = data[t.iv];
    if (!d) continue;
    rsiSum += d.rsi; cnt++; if (d.up) oscBull++;
  }
  const avg = cnt ? rsiSum/cnt : 50;

  // Volume
  const tot = vol.b + vol.s;
  const bp = tot > 0 ? vol.b/tot*100 : 50;
  const sp = 100 - bp;
  el('vBuy').textContent = bp.toFixed(0) + '%';
  el('vSell').textContent = sp.toFixed(0) + '%';
  el('vBuy').style.color = bp > 55 ? '#00c864' : '#666';
  el('vSell').style.color = sp > 55 ? '#dc3232' : '#666';

  // Trend
  let tT, tC;
  if (avg > 60) { tT='GÜÇLÜ ↑'; tC='#00c864'; }
  else if (avg > 52) { tT='↑ YÜKSELİŞ'; tC='#00a050'; }
  else if (avg < 40) { tT='GÜÇLÜ ↓'; tC='#dc3232'; }
  else if (avg < 48) { tT='↓ DÜŞÜŞ'; tC='#c83232'; }
  else { tT='KARARSIZ ⟷'; tC='#666'; }

  // Regime
  const vals = TFS.map(t => data[t.iv]?.rsi || 50);
  const spread = Math.max(...vals) - Math.min(...vals);
  let rT, rC;
  if (spread > 15) { rT='GÜÇLÜ TREND'; rC='#00c864'; }
  else if (spread > 8) { rT='TREND'; rC='#00a050'; }
  else if (spread < 5) { rT='RANGE'; rC='#666'; }
  else { rT='GEÇİŞ'; rC='#b0b000'; }

  // Osc
  let oT, oC;
  if (oscBull >= 3) { oT=oscBull+'/4 LONG'; oC='#00c864'; }
  else if (oscBull <= 1) { oT=(4-oscBull)+'/4 SHORT'; oC='#dc3232'; }
  else { oT='KARIŞIK '+oscBull+'/4'; oC='#666'; }

  // Volume text
  let vT, vC;
  if (bp > 55) { vT='ALICI %'+bp.toFixed(0); vC='#00c864'; }
  else if (sp > 55) { vT='SATICI %'+sp.toFixed(0); vC='#dc3232'; }
  else { vT='DENGELİ'; vC='#666'; }

  // Stars
  let st = 0;
  if (avg > 55 || avg < 45) st++;
  if (spread > 8) st++;
  if (bp > 55 || sp > 55) st++;
  if (oscBull >= 3 || oscBull <= 1) st++;
  if (avg > 60 || avg < 40) st++;
  let starT = '';
  for (let i = 0; i < 5; i++) starT += i < st ? '★' : '☆';
  const stC = st >= 4 ? '#ffd700' : st >= 3 ? '#c8c864' : '#555';

  setKM('kmT', tT, tC); setKM('kmR', rT, rC);
  setKM('kmH', vT, vC); setKM('kmO', oT, oC);
  el('kmK').textContent = starT; el('kmK').style.color = stC;

  // Probability
  const pRSI = avg, pOsc = oscBull/4*100, pVol = bp;
  const pUp = Math.max(0, Math.min(100, 0.35*pRSI + 0.30*pOsc + 0.35*pVol));
  const pDn = 100 - pUp;
  let pDir, pVal, pC2;
  if (pUp > 55) { pDir='LONG'; pVal=pUp; pC2='#00c864'; }
  else if (pUp < 45) { pDir='SHORT'; pVal=pDn; pC2='#dc3232'; }
  else { pDir='NÖTR'; pVal=50; pC2='#666'; }

  el('probVal').textContent = pDir + ' %' + pVal.toFixed(0);
  el('probVal').style.color = pC2;
  const pf = el('probFill');
  pf.style.width = pUp + '%';
  pf.style.background = pUp > 55 ? 'linear-gradient(90deg,#004d28,#00c864)' : pUp < 45 ? 'linear-gradient(90deg,#dc3232,#4d1111)' : '#444';
  pf.textContent = pUp.toFixed(0) + '%';

  // Entry signal
  const rsiRising = avg > (data['15m']?.prev || avg);
  const rsiFalling = avg < (data['15m']?.prev || avg);
  const momL = rsiRising, momS = rsiFalling;
  const eLong = avg > 52 && bp >= 55 && momL && pUp > 55 && st >= 3 && oscBull >= 3;
  const eShort = avg < 48 && sp >= 55 && momS && pUp < 45 && st >= 3 && oscBull <= 1;

  const sc = el('signalCard'), stx = el('signalTxt'), cr = el('chkRow');

  // Checklist
  const chks = [
    { l:'T', ok: avg > 55 || avg < 45 },
    { l:'R', ok: spread > 8 },
    { l:'H', ok: bp >= 55 || sp >= 55 },
    { l:'M', ok: momL || momS },
    { l:'O', ok: pUp > 55 || pUp < 45 },
    { l:'K', ok: st >= 3 }
  ];
  cr.innerHTML = chks.map(c => `<span class="${c.ok?'ok':'fail'}">${c.ok?'✓':'✗'}${c.l}</span>`).join(' ');

  let newSignal = 'wait';
  if (eLong) {
    sc.className = 'signal-card long-ready signal-pulse';
    stx.textContent = '✅ LONG HAZIR';
    newSignal = 'long';
  } else if (eShort) {
    sc.className = 'signal-card short-ready signal-pulse';
    stx.textContent = '✅ SHORT HAZIR';
    newSignal = 'short';
  } else {
    sc.className = 'signal-card wait';
    stx.textContent = '❌ BEKLE';
  }

  if (newSignal !== prevSignal && (eLong || eShort)) {
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
  }
  prevSignal = newSignal;
}

function renderAlert() {
  const box = el('alertBox');
  const avg = Object.values(data).reduce((s, d) => s + d.rsi, 0) / Object.keys(data).length;
  const thr = 70; // pullback threshold above 70
  
  if (avg > thr) {
    const pb = avg - (data['15m']?.prev || avg);
    if (pb > -3 && pb < 0 && avg > thr) {
      box.className = 'alert-box show pullback-long';
      box.textContent = 'Uzun pozisyon için geri çekilme. DCA fırsatı!';
    } else if (pb < 3 && pb > 0) {
      box.className = 'alert-box show strong-up';
      box.textContent = 'Yukarı ivme güçleniyor!';
    }
  } else if (avg < 30) {
    const pb = (data['15m']?.prev || avg) - avg;
    if (pb > -3 && pb < 0) {
      box.className = 'alert-box show pullback-short';
      box.textContent = 'Kısa pozisyon için geri çekilme. DCA fırsatı!';
    } else if (pb < 3 && pb > 0) {
      box.className = 'alert-box show strong-dn';
      box.textContent = 'Aşağı ivme güçleniyor!';
    }
  } else {
    box.className = 'alert-box';
  }
}

// ─── Helpers ───
const el = id => document.getElementById(id);
const setSt = (id, txt) => { const e = el('status' + id.charAt(0).toUpperCase() + id.slice(1)); if(e) e.textContent = txt; };
const setKM = (id, t, c) => { el(id).textContent = t; el(id).style.color = c; };

function go(s) {
  if (SYM === s) return;
  SYM = s;
  document.querySelectorAll('.sym-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(s)));
  connectWS();
  load();
  el('searchInput').value = '';
  el('searchResults').classList.remove('show');
}

const coins = [
  { n: 'Bitcoin', p: 'BTCUSDT' },
  { n: 'Ethereum', p: 'ETHUSDT' },
  { n: 'Solana', p: 'SOLUSDT' },
  { n: 'BNB', p: 'BNBUSDT' },
  { n: 'XRP', p: 'XRPUSDT' },
  { n: 'Dogecoin', p: 'DOGEUSDT' },
  { n: 'Flow', p: 'FLOWUSDT' },
  { n: 'Acx', p: 'ACXUSDT' },
  { n: 'Sui', p: 'SUIUSDT' },
  { n: 'Pepe', p: 'PEPEUSDT' },
  { n: 'Wif', p: 'WIFUSDT' }
];

function searchCoin(q) {
  const sr = el('searchResults');
  if (!q) { sr.classList.remove('show'); return; }
  const f = coins.filter(c => c.n.toLowerCase().includes(q.toLowerCase()) || c.p.toLowerCase().includes(q.toLowerCase()));
  sr.innerHTML = f.length ? f.map(c => `<div class="search-item" onclick="go('${c.p}')"<div><span class="name">${c.n}</span><span class="pair">${c.p}</span></div><span class="price-sm" id="p${c.p}">--</span></div>`).join('') : '<div class="search-no-result">Coin bulunamadı</div>';
  sr.classList.toggle('show', f.length > 0);
}

function searchGo() {
  const i = el('searchInput');
  const c = coins.find(x => x.p === i.value.toUpperCase() || x.n.toLowerCase() === i.value.toLowerCase());
  if (c) go(c.p);
}

// ─── Init ───
window.addEventListener('load', () => { load(); connectWS(); });

// Live update via WebSocket (separate for price)
setInterval(() => { if (document.hidden) return; load(); }, 15000);
</script>
