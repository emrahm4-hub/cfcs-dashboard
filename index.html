<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CFCS v4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  background: #0a0a0f; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  font-size: 14px; min-height: 100vh; overflow-x: hidden;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}

/* âââ HEADER âââ */
.header {
  background: linear-gradient(180deg, #12121a, #0e0e16);
  padding: 8px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #1a1a2a;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.header .logo { font-size: 14px; color: #00e5ff; font-weight: 800; letter-spacing: 1px; }
.header .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #00c864; display: inline-block; margin-right: 6px; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.price-block { text-align: right; }
.price-block .price { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; transition: color 0.2s; }
.price-block .sym { font-size: 10px; color: #666; }

/* âââ SYMBOL BAR âââ */
.sym-bar {
  background: #0a0a0f; padding: 6px 12px;
  display: flex; gap: 6px; overflow-x: auto;
  border-bottom: 1px solid #111;
  scrollbar-width: none;
}
.sym-bar::-webkit-scrollbar { display: none; }
.sym-btn {
  background: #16161e; border: 1px solid #222;
  color: #888; padding: 5px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer;
  transition: all 0.2s;
}
.sym-btn.active { background: #0077b6; color: #fff; border-color: #00b4d8; }
.sym-btn:active { transform: scale(0.93); }

/* âââ SEARCH BAR âââ */
.search-bar {
  background: #0a0a0f; padding: 6px 12px;
  display: flex; gap: 6px; align-items: center;
  border-bottom: 1px solid #111;
}
.search-bar input {
  flex: 1; background: #16161e; border: 1px solid #222;
  color: #fff; padding: 8px 12px; border-radius: 10px;
  font-size: 13px; text-transform: uppercase; outline: none;
  font-family: inherit;
}
.search-bar input::placeholder { color: #444; text-transform: none; }
.search-bar input:focus { border-color: #00b4d8; }
.search-bar button {
  background: linear-gradient(135deg, #00b4d8, #0077b6);
  color: #fff; border: none; padding: 8px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 700; cursor: pointer;
}
.search-bar button:active { transform: scale(0.93); }

.search-results {
  background: #12121a; border: 1px solid #222; border-radius: 10px;
  margin: 0 12px; max-height: 200px; overflow-y: auto;
  display: none; position: relative; z-index: 50;
}
.search-results.show { display: block; }
.search-item {
  padding: 10px 12px; border-bottom: 1px solid #1a1a2a;
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
}
.search-item:last-child { border-bottom: none; }
.search-item:active { background: #1a1a2e; }
.search-item .name { font-size: 13px; font-weight: 600; color: #e0e0e0; }
.search-item .pair { font-size: 10px; color: #555; }
.search-item .price-sm { font-size: 12px; color: #888; font-variant-numeric: tabular-nums; }
.search-no-result { padding: 12px; text-align: center; font-size: 12px; color: #444; }

/* âââ PULLBACK ALERT âââ */
.alert-box {
  margin: 6px 10px; padding: 10px; border-radius: 10px;
  font-size: 12px; font-weight: 600; text-align: center;
  display: none; line-height: 1.4;
}
.alert-box.show { display: block; }
.alert-box.pullback-long { background: rgba(0,180,216,0.1); border: 1px solid rgba(0,180,216,0.3); color: #00b4d8; }
.alert-box.pullback-short { background: rgba(255,165,0,0.1); border: 1px solid rgba(255,165,0,0.3); color: #ffa500; }
.alert-box.strong-up { background: rgba(0,200,100,0.1); border: 1px solid rgba(0,200,100,0.3); color: #00c864; }
.alert-box.strong-dn { background: rgba(220,50,50,0.1); border: 1px solid rgba(220,50,50,0.3); color: #dc3232; }
.alert-box.deep-pb { background: rgba(255,100,0,0.1); border: 1px solid rgba(255,100,0,0.3); color: #ff6400; }

/* âââ ENTRY SIGNAL âââ */
.signal-card {
  margin: 6px 10px; padding: 14px; border-radius: 14px;
  text-align: center; transition: all 0.3s;
}
.signal-card.long-ready { background: linear-gradient(135deg, rgba(0,200,100,0.12), rgba(0,200,100,0.04)); border: 2px solid rgba(0,200,100,0.5); }
.signal-card.short-ready { background: linear-gradient(135deg, rgba(220,50,50,0.12), rgba(220,50,50,0.04)); border: 2px solid rgba(220,50,50,0.5); }
.signal-card.wait { background: rgba(40,40,50,0.5); border: 2px solid #2a2a3a; }
.signal-card.entry-now-long { background: linear-gradient(135deg, rgba(0,255,100,0.2), rgba(0,200,100,0.08)); border: 2px solid #00ff64; box-shadow: 0 0 20px rgba(0,255,100,0.15); }
.signal-card.entry-now-short { background: linear-gradient(135deg, rgba(255,50,50,0.2), rgba(220,50,50,0.08)); border: 2px solid #ff3232; box-shadow: 0 0 20px rgba(255,50,50,0.15); }
.signal-txt { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
.signal-card.long-ready .signal-txt { color: #00c864; }
.signal-card.short-ready .signal-txt { color: #dc3232; }
.signal-card.wait .signal-txt { color: #555; }
.signal-card.entry-now-long .signal-txt { color: #00ff64; }
.signal-card.entry-now-short .signal-txt { color: #ff3232; }
